<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sabor — Glasanja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
  // Apply saved theme / density / text-size before first paint to avoid a flash.
  try {
    var d = document.documentElement, ls = localStorage;
    d.setAttribute('data-theme', ls.getItem('sabor.theme') || 'auto');
    d.setAttribute('data-density', ls.getItem('sabor.density') || 'standard');
    d.setAttribute('data-fontsize', ls.getItem('sabor.fontsize') || 'standard');
  } catch (e) {}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f3ec;
    --fg: #2b2926;
    --gray-1: #efeadf;
    --gray-2: #e0dacd;
    --gray-3: #b3aa98;
    --gray-4: #716c5f;
    --green: #2d8a4e;
    --red: #c0392b;
    --vote-za: #2d8a4e;
    --vote-protiv: #c0392b;
    --vote-suzdrzani: #888;
    --vote-odsutni: #d8d8d8;
    --badge-pass-bg: #bfe2c8; --badge-pass-fg: #1d6637;
    --badge-rej-bg: #f1ccc6;  --badge-rej-fg: #a23529;
    --badge-unk-bg: #e3ddd0;  --badge-unk-fg: #6f6a5d;
    --cell-sep: rgba(255, 255, 255, 0.45);
    --scrim: rgba(17, 17, 17, 0.32);
    --radius: 4px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    --font-mono: 'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
    --maxw: 1200px;

    /* Type scale multiplier — driven by the text-size setting */
    --font-scale: 1;

    /* Spacing scale — driven by the density setting (Standardno baseline) */
    --page-pad-top: 48px;
    --page-pad-x: 24px;
    --page-pad-bottom: 64px;
    --group-gap: 44px;
    --session-header-mb: 18px;
    --cards-gap: 16px;
    --card-pad-y: 20px;
    --card-pad-x: 22px;
    --card-gap: 14px;
  }

  /* ── Dark theme — warm, never pure black/white. Explicit dark + auto follows the OS. ── */
  :root[data-theme="dark"] {
    --bg: #1e1c19;
    --fg: #e9e4d8;
    --gray-1: #2a2723;
    --gray-2: #3a352e;
    --gray-3: #6f685b;
    --gray-4: #a59d8c;
    --vote-za: #3c9e5e;
    --vote-protiv: #d24b3c;
    --vote-suzdrzani: #8a8475;
    --vote-odsutni: #423c33;
    --badge-pass-bg: #23402c; --badge-pass-fg: #8fd3a3;
    --badge-rej-bg: #43221d;  --badge-rej-fg: #e6a89f;
    --badge-unk-bg: #322e27;  --badge-unk-fg: #a59d8c;
    --cell-sep: rgba(0, 0, 0, 0.4);
    --scrim: rgba(0, 0, 0, 0.5);
  }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] {
      --bg: #1e1c19;
      --fg: #e9e4d8;
      --gray-1: #2a2723;
      --gray-2: #3a352e;
      --gray-3: #6f685b;
      --gray-4: #a59d8c;
      --vote-za: #3c9e5e;
      --vote-protiv: #d24b3c;
      --vote-suzdrzani: #8a8475;
      --vote-odsutni: #423c33;
      --badge-pass-bg: #23402c; --badge-pass-fg: #8fd3a3;
      --badge-rej-bg: #43221d;  --badge-rej-fg: #e6a89f;
      --badge-unk-bg: #322e27;  --badge-unk-fg: #a59d8c;
      --cell-sep: rgba(0, 0, 0, 0.4);
      --scrim: rgba(0, 0, 0, 0.5);
    }
  }

  /* Density steps — override the spacing scale */
  :root[data-density="compact"] {
    --page-pad-top: 32px; --page-pad-bottom: 48px;
    --group-gap: 30px; --session-header-mb: 12px; --cards-gap: 10px;
    --card-pad-y: 14px; --card-pad-x: 16px; --card-gap: 10px;
  }
  :root[data-density="spacious"] {
    --page-pad-top: 68px; --page-pad-bottom: 88px;
    --group-gap: 64px; --session-header-mb: 26px; --cards-gap: 24px;
    --card-pad-y: 28px; --card-pad-x: 30px; --card-gap: 18px;
  }

  /* Text-size steps — override the type scale */
  :root[data-fontsize="small"] { --font-scale: 0.9; }
  :root[data-fontsize="large"] { --font-scale: 1.14; }

  body {
    font-family: var(--font); background: var(--bg); color: var(--fg);
    font-size: calc(15px * var(--font-scale)); line-height: 1.55;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility;
  }

  /* ── Layout ── */
  /* Full-bleed header band: the 1px divider spans the whole page, content stays centred. */
  .site-header { border-bottom: 1px solid var(--fg); }
  .site-header-inner {
    max-width: var(--maxw); margin: 0 auto;
    padding: 0 var(--page-pad-x);
    display: flex; align-items: stretch; gap: 0; min-height: 112px;
  }
  .header-brand { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
  .wordmark { font-family: var(--font-display); font-size: calc(clamp(26px, 4vw, 34px) * var(--font-scale)); font-weight: 700; letter-spacing: 0.05em; line-height: 1; }
  .brand-sub { font-family: var(--font-mono); color: var(--gray-4); font-size: 11px; margin-top: 8px; letter-spacing: -0.01em; }
  .brand-sub a { color: inherit; }

  /* Main nav — full-height Fontshare-style cells divided by hairlines, active cell inverted */
  .main-nav { display: flex; align-self: stretch; margin-left: auto; }
  .nav-link {
    display: flex; align-items: center; justify-content: center;
    min-width: 116px; padding: 0 22px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--gray-4); background: transparent;
    border: none; border-left: 1px solid var(--gray-2); cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .main-nav .nav-link:last-child { border-right: 1px solid var(--gray-2); }
  .nav-link:hover { color: var(--fg); background: var(--gray-1); }
  .nav-link.active, .nav-link.active:hover { color: var(--bg); background: var(--fg); }
  .nav-link--disabled, .nav-link:disabled { color: var(--gray-3); opacity: 0.55; cursor: default; }
  .nav-link--disabled:hover { color: var(--gray-3); background: transparent; }

  .app { max-width: var(--maxw); margin: 0 auto; padding: 32px var(--page-pad-x) var(--page-pad-bottom); }

  /* Empty-section placeholder (e.g. Zastupnici before the scorecard lands) */
  .section-placeholder { padding: 96px 0; text-align: center; }
  .placeholder-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 10px; }
  .placeholder-text { font-family: var(--font-mono); font-size: 13px; color: var(--gray-4); letter-spacing: -0.01em; }

  /* Settings gear */
  .settings-btn {
    flex-shrink: 0; width: 40px; height: 40px; align-self: center; margin-left: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--gray-2); background: transparent;
    color: var(--gray-4); cursor: pointer; transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .settings-btn:hover { color: var(--fg); border-color: var(--gray-3); background: var(--gray-1); }

  /* ── List view — session-grouped vote table ── */
  .session-group { margin-bottom: var(--group-gap); }
  .session-header { margin-bottom: var(--session-header-mb); }
  .session-name { font-family: var(--font-display); font-size: calc(clamp(20px, 2.6vw, 26px) * var(--font-scale)); font-weight: 600; letter-spacing: -0.015em; }
  .session-date { font-family: var(--font-mono); font-size: 12px; color: var(--gray-4); margin-top: 4px; letter-spacing: -0.01em; }

  /* Vote table — bordered list of stacked rows, hairline separators, sharp corners */
  .vote-table { border: 1px solid var(--gray-2); }

  .vote-row {
    display: flex; flex-direction: column; gap: 12px;
    padding: calc(var(--card-pad-y) * 2) 40px; border-bottom: 1px solid var(--gray-2);
    cursor: pointer; transition: background 0.12s;
  }
  .vote-row:last-child { border-bottom: none; }
  .vote-row:hover { background: var(--gray-1); }
  .vote-row-title { font-size: calc(17px * var(--font-scale)); font-weight: 600; line-height: 1.4; letter-spacing: -0.01em; }
  .vote-row-proposer { font-family: var(--font-mono); font-size: calc(11px * var(--font-scale)); color: var(--gray-4); margin-top: 5px; letter-spacing: -0.01em; }

  /* Result bar sits under the title, full row width */
  .vote-row-bar { display: flex; height: 8px; overflow: hidden; }
  .vote-row-bar span { display: block; }

  .load-more {
    display: block; width: 100%; margin-top: 24px; padding: 15px;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--gray-4); background: transparent; border: 1px solid var(--gray-2); cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .load-more:hover { background: var(--gray-1); color: var(--fg); border-color: var(--gray-3); }

  /* stacked-bar segment colours (shared) */
  .seg-za { background: var(--vote-za); }
  .seg-protiv { background: var(--vote-protiv); }
  .seg-suzdrzani { background: var(--vote-suzdrzani); }
  .seg-odsutni { background: var(--vote-odsutni); }

  /* result badge */
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
  }
  .badge-prihvaceno { background: var(--badge-pass-bg); color: var(--badge-pass-fg); }
  .badge-odbijeno { background: var(--badge-rej-bg); color: var(--badge-rej-fg); }
  .badge-nepoznato { background: var(--badge-unk-bg); color: var(--badge-unk-fg); }

  /* ── Detail view ── */
  #detail-view { display: none; }
  #detail-view.visible { display: block; }

  .back-btn {
    background: none; border: none; cursor: pointer; font-size: 13px;
    color: var(--gray-4); padding: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--fg); }

  .detail-header { margin-bottom: 24px; }
  .detail-meta { font-family: var(--font-mono); font-size: 12px; color: var(--gray-4); margin-bottom: 8px; letter-spacing: -0.01em; }
  .detail-title { font-family: var(--font-display); font-size: calc(clamp(26px, 4vw, 34px) * var(--font-scale)); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 14px; }
  .detail-proposer-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .proposer-chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--gray-2); border-radius: 20px; padding: 3px 10px 3px 7px;
  }
  .proposer-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-3); flex-shrink: 0; }
  .detail-result-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .detail-result-row .badge { font-size: 12px; padding: 4px 10px; }
  .tally-text { font-size: 13px; color: var(--gray-4); }
  .tally-text strong { color: var(--fg); }

  /* ELI5 */
  .eli5 {
    background: var(--gray-1); border-left: 3px solid var(--gray-2);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 24px;
  }
  .eli5-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-4); margin-bottom: 6px; }
  .eli5-text { font-style: italic; color: var(--gray-4); font-size: calc(13px * var(--font-scale)); }

  /* ── Breakdown sections ── */
  .section { margin-bottom: 28px; }
  .section-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--gray-4); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--gray-2);
  }

  /* Shared vote legend */
  .total-bar-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray-4); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-item strong { color: var(--fg); font-family: var(--font-mono); font-weight: 700; }

  /* Master vote section — reset sits top-right, no title/divider */
  .vote-section { position: relative; }
  .mp-grid-reset { position: absolute; top: 0; right: 0; z-index: 2;
    font-size: 11px; color: var(--gray-4); cursor: pointer; border: none; background: none; padding: 0; }
  .mp-grid-reset:hover { color: var(--fg); }

  /* Hemicycle seating chart */
  .hemicycle-wrap { display: flex; justify-content: center; }
  .hemicycle { width: 100%; max-width: 540px; height: auto; }
  .hemicycle circle { transition: opacity 0.15s, transform 0.1s; cursor: default; stroke: var(--bg); }
  /* Tappable seats: pointer cursor, gentle pop + outline on hover/focus. */
  .hemicycle circle.seat { cursor: pointer; transform-box: fill-box; transform-origin: center; }
  .hemicycle circle.seat:hover { transform: scale(1.5); stroke: var(--fg); stroke-width: 1; }
  .hemicycle circle.seat:focus-visible { outline: none; stroke: var(--fg); stroke-width: 1.4; }
  .seating-empty { color: var(--gray-3); font-size: 13px; padding: 16px 0; text-align: center; }

  /* Sticky "back to vote" pill — slides up after tapping a seat into an MP profile. */
  .mp-return-bar {
    position: fixed; left: 50%; bottom: 24px; z-index: 60;
    transform: translate(-50%, 160%); transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex; align-items: stretch;
    background: var(--fg); color: var(--bg);
    border-radius: 999px; box-shadow: 0 8px 28px var(--scrim);
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; overflow: hidden;
  }
  .mp-return-bar.show { transform: translate(-50%, 0); }
  .mp-return-bar button {
    background: transparent; border: none; color: inherit; cursor: pointer;
    font: inherit; letter-spacing: inherit; display: inline-flex; align-items: center;
    transition: background 0.12s;
  }
  .mp-return-bar .mp-return-go { gap: 8px; padding: 13px 20px; text-transform: uppercase; }
  .mp-return-bar .mp-return-go:hover { background: rgba(127, 127, 127, 0.25); }
  .mp-return-bar .mp-return-x {
    padding: 0 16px; border-left: 1px solid rgba(127, 127, 127, 0.45);
    font-size: 16px; line-height: 1;
  }
  .mp-return-bar .mp-return-x:hover { background: rgba(127, 127, 127, 0.25); }

  /* Distribution bar — one cell per MP. Full width on desktop. */
  .cell-bar-wrap { margin: 14px 0 0; }
  .cell-bar { display: flex; height: 22px; border-radius: 3px; overflow: hidden; }
  .cell { flex: 1 1 0; min-width: 0; transition: opacity 0.15s;
    box-shadow: inset -1px 0 0 var(--cell-sep); }

  /* Mobile: per-option stacked bars (hidden on desktop) */
  .cell-bars--split { display: none; }
  .split-row { margin-bottom: 12px; }
  .split-row:last-child { margin-bottom: 0; }
  .split-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-4); margin-bottom: 4px; }
  .split-label strong { color: var(--fg); font-family: var(--font-mono); font-weight: 700; }

  /* Club pills */
  .club-pills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 18px; }
  .club-pill {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; color: var(--fg); font-family: inherit;
    background: transparent; border: 1px solid var(--gray-2); border-radius: 20px; padding: 3px 10px 3px 8px;
    transition: background 0.12s, border-color 0.12s;
  }
  .club-pill:hover { border-color: var(--gray-3); }
  .club-pill.active { background: var(--gray-1); border-color: var(--gray-4); }
  .pill-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .pill-count { color: var(--gray-3); font-weight: 400; font-family: var(--font-mono); }
  .club-pill.active .pill-count { color: var(--fg); }
  .selection-summary { text-align: center; margin-top: 12px; font-size: 13px; color: var(--gray-4); }
  .selection-summary strong { color: var(--fg); }

  /* ── Zastupnici scorecard ── */
  .scorecard-summary { font-family: var(--font-mono); font-size: 12px; color: var(--gray-4); margin-bottom: 18px; letter-spacing: -0.01em; }
  .mp-table { width: 100%; border-collapse: collapse; border: 1px solid var(--gray-2); }
  .mp-table th, .mp-table td { text-align: left; padding: 11px 16px; border-bottom: 1px solid var(--gray-2); vertical-align: middle; }
  .mp-table tbody tr:last-child td { border-bottom: none; }
  .mp-table tbody tr:hover { background: var(--gray-1); }
  .sc-th {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--gray-4); white-space: nowrap;
  }
  .sc-th[data-key] { cursor: pointer; user-select: none; }
  .sc-th[data-key]:hover { color: var(--fg); }
  td.sc-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .name-abbr { display: none; }
  .mp-term { display: block; font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--gray-3); margin-top: 3px; letter-spacing: -0.01em; }
  .mp-row--inactive { opacity: 0.5; }
  .mp-row--inactive:hover { opacity: 1; }
  td.sc-club { font-size: 13px; color: var(--gray-4); }
  .club-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
  .sc-part { width: 210px; }
  .part-cell { display: flex; align-items: center; gap: 10px; }
  .part-bar { flex: 1; height: 7px; background: var(--gray-2); border-radius: 4px; overflow: hidden; min-width: 56px; }
  .part-bar > span { display: block; height: 100%; background: var(--fg); border-radius: 4px; }
  .part-pct { font-family: var(--font-mono); font-size: 12px; font-weight: 700; min-width: 40px; text-align: right; }
  th.sc-num, td.sc-num { width: 60px; text-align: right; white-space: nowrap; padding-left: 8px; padding-right: 16px; }
  td.sc-num { font-family: var(--font-mono); font-size: 12px; }
  .rz-za { color: var(--vote-za); } .rz-protiv { color: var(--vote-protiv); }
  .rz-suzdrzani { color: var(--gray-4); } .rz-nije { color: var(--gray-3); }

  /* MP profile */
  .mp-table tbody tr.mp-row { cursor: pointer; }
  .mp-bignum { font-family: var(--font-display); font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .mp-subnote { font-size: 13px; color: var(--gray-4); margin-top: 8px; }
  .mp-subnote strong { color: var(--fg); }
  .exp-breakdown { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .exp-item { font-size: 12px; color: var(--gray-4); background: var(--gray-1); border: 1px solid var(--gray-2); border-radius: 20px; padding: 4px 11px; }
  .exp-item strong { color: var(--fg); font-family: var(--font-mono); font-weight: 700; }
  /* MP dashboard — headline stats as a hairline-bordered card grid */
  .mp-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--gray-2); border: 1px solid var(--gray-2); margin-bottom: 24px; }
  .mp-card { background: var(--bg); padding: 16px 18px; }
  .mp-card-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-4); margin-bottom: 9px; }
  .mp-card-value { font-family: var(--font-display); font-size: 25px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
  /* MP about/bio */
  .mp-header { display: flex; gap: 18px; align-items: center; }
  .mp-photo { width: 88px; height: 88px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--gray-1); }
  .mp-about { display: flex; flex-direction: column; gap: 7px; }
  .about-row { display: flex; gap: 10px; font-size: 14px; align-items: baseline; }
  .about-k { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-4); min-width: 134px; flex-shrink: 0; }
  .about-odbori { margin: 8px 0 0; padding-left: 18px; font-size: 13px; color: var(--gray-4); }
  .about-odbori li { margin-bottom: 3px; }
  .mp-zivotopis { font-size: 14px; line-height: 1.6; color: var(--fg); margin: 0 0 18px; }

  /* ── Settings (slide-over panel) ── */
  .settings-overlay {
    position: fixed; inset: 0; background: var(--scrim);
    opacity: 0; visibility: hidden; transition: opacity 0.18s, visibility 0.18s; z-index: 40;
  }
  .settings-overlay.open { opacity: 1; visibility: visible; }

  .settings-panel {
    position: fixed; top: 0; right: 0; height: 100%; width: 380px; max-width: 86vw;
    background: var(--bg); border-left: 1px solid var(--gray-2);
    box-shadow: -8px 0 30px rgba(0, 0, 0, 0.08);
    transform: translateX(100%); transition: transform 0.22s ease; z-index: 41;
    display: flex; flex-direction: column; padding: 22px 22px 28px;
  }
  .settings-overlay.open .settings-panel { transform: translateX(0); }

  .settings-head {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 16px; margin-bottom: 22px; border-bottom: 1px solid var(--gray-2);
  }
  .settings-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .settings-close {
    width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--gray-4); cursor: pointer; border-radius: 7px;
  }
  .settings-close:hover { color: var(--fg); background: var(--gray-1); }

  .settings-group { margin-bottom: 24px; }
  .settings-group-label {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--gray-4); margin-bottom: 10px;
  }

  .seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    border: 1px solid var(--gray-2); overflow: hidden;
  }
  .seg button {
    font-family: inherit; font-size: 13px; font-weight: 500; color: var(--gray-4);
    background: transparent; border: none; border-right: 1px solid var(--gray-2);
    padding: 9px 6px; cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .seg button:last-child { border-right: none; }
  .seg button:hover { background: var(--gray-1); color: var(--fg); }
  .seg button.active { background: var(--fg); color: var(--bg); }

  /* Larger screens: a touch more horizontal padding + scaled base size */
  @media (min-width: 768px) {
    body { font-size: calc(16px * var(--font-scale)); }
    :root { --page-pad-x: 32px; }
  }

  /* Mobile: swap the combined bar for stacked per-option bars */
  @media (max-width: 600px) {
    .cell-bar.cell-bar--combined { display: none; }
    .cell-bars--split { display: block; }
    .total-bar-legend { display: none; }   /* split-row labels replace it */
    .vote-row { padding-left: 14px; padding-right: 14px; }

    /* Header: brand + gear on row 1, nav cells full-width on row 2 */
    .site-header-inner { flex-wrap: wrap; align-items: center; min-height: 0; padding-top: 28px; }
    .settings-btn { align-self: center; margin-left: auto; }
    .main-nav { order: 3; width: 100%; margin: 22px 0 0; border-top: 1px solid var(--gray-2); }
    .nav-link { flex: 1; min-width: 0; padding: 14px 8px; }
    .main-nav .nav-link:first-child { border-left: none; }
    .main-nav .nav-link:last-child { border-right: none; }

    /* Scorecard: drop the Z/P/S/N columns + the bar, abbreviate surnames */
    .mp-table th.sc-num, .mp-table td.sc-num { display: none; }
    .mp-table th, .mp-table td { padding: 10px 10px; }
    .sc-part { width: 1%; white-space: nowrap; }
    .part-bar { display: none; }
    .name-full { display: none; }
    .name-abbr { display: inline; }
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <div class="header-brand">
      <h1 class="wordmark">SABOR</h1>
      <p class="brand-sub">11. saziv · <a href="https://parlametar.hr" target="_blank">parlametar.hr</a></p>
    </div>
    <nav class="main-nav" id="main-nav" aria-label="Glavna navigacija">
      <button class="nav-link active" data-section="glasanja">Glasanja</button>
      <button class="nav-link" data-section="zastupnici">Zastupnici</button>
      <button class="nav-link nav-link--disabled" data-section="klubovi" disabled aria-disabled="true" title="Uskoro">Klubovi</button>
    </nav>
    <button class="settings-btn" id="settings-btn" aria-label="Postavke" title="Postavke"></button>
  </div>
</header>

<div class="app">
  <!-- LIST VIEW -->
  <div id="list-view">
    <div id="vote-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <button class="back-btn" id="back-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg> Natrag na popis</button>
    <div id="detail-content"></div>
  </div>

  <!-- ZASTUPNICI SECTION (participation scorecard) -->
  <div id="zastupnici-view" style="display:none">
    <div id="scorecard"></div>
  </div>

  <!-- MP PROFILE (reached from a scorecard row) -->
  <div id="mp-view" style="display:none">
    <button class="back-btn" id="mp-back-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg> Natrag na zastupnike</button>
    <div id="mp-content"></div>
  </div>

  <!-- Sticky return pill — appears when an MP profile is opened from a vote's seating chart -->
  <div class="mp-return-bar" id="mp-return-bar" role="region" aria-label="Povratak na glasanje">
    <button class="mp-return-go" id="mp-return-go" type="button">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Natrag na glasanje
    </button>
    <button class="mp-return-x" id="mp-return-x" type="button" aria-label="Odbaci">×</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-overlay" id="settings-overlay">
  <aside class="settings-panel" role="dialog" aria-modal="true" aria-label="Postavke">
    <div class="settings-head">
      <div class="settings-title">Postavke</div>
      <button class="settings-close" id="settings-close" aria-label="Zatvori"></button>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">Tema</div>
      <div class="seg" id="seg-theme">
        <button data-theme="light">Svijetla</button>
        <button data-theme="auto">Automatska</button>
        <button data-theme="dark">Tamna</button>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">Gustoća prikaza</div>
      <div class="seg" id="seg-density">
        <button data-density="compact">Zbijeno</button>
        <button data-density="standard">Standardno</button>
        <button data-density="spacious">Prozračno</button>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">Veličina teksta</div>
      <div class="seg" id="seg-fontsize">
        <button data-fontsize="small">Manja</button>
        <button data-fontsize="standard">Standardna</button>
        <button data-fontsize="large">Veća</button>
      </div>
    </div>

  </aside>
</div>

<script>
const ICONS = {
  gear:  `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  close: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`,
};

const VOTE_LABELS = { za: 'Za', protiv: 'Protiv', suzdrzani: 'Suzdržani', odsutni: 'Odsutni / nisu glasovali' };
const VOTE_COLORS = { za: 'var(--vote-za)', protiv: 'var(--vote-protiv)', suzdrzani: 'var(--vote-suzdrzani)', odsutni: 'var(--vote-odsutni)' };
const MP_CLASS = { for: 'za', against: 'protiv', abstain: 'abstain', absent: 'absent', 'did not vote': 'absent' };
// Seat fill keyed by the raw API vote option (CSS vars so the chart follows the theme).
const SEAT_COLOR = { for: 'var(--vote-za)', against: 'var(--vote-protiv)', abstain: 'var(--vote-suzdrzani)', absent: 'var(--vote-odsutni)', 'did not vote': 'var(--vote-odsutni)' };
const SEAT_VOTE_LABEL = { for: 'Za', against: 'Protiv', abstain: 'Suzdržan/a', absent: 'Odsutan/na', 'did not vote': 'Nije glasovao/la' };

let votes = [];
let expenses = null;   // per-MP 2025 work expenses (Sabor), keyed by mp_slug
let mpInfo = null;      // per-MP scraped bio (photo, party, izborna, committees), keyed by mp_slug
const SESSIONS_INITIAL = 4, SESSIONS_STEP = 4;   // session groups shown, grows on "Učitaj više"
let listVisible = SESSIONS_INITIAL;
let listScrollY = 0;             // remember feed scroll position while a detail is open
let activeVoteIdx = -1;          // index of the currently open vote (for seat → MP → back)
let mpReturn = null;             // { idx, scrollY } return path when an MP is opened from a vote
const activeClubs = new Set();   // club_slugs currently highlighted in the detail view

// ── Helpers ──────────────────────────────────────────────────────────────────

function fmt(date) {
  const d = new Date(date);
  return d.toLocaleDateString('hr-HR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// Capitalize the first letter of each word (for session headings).
function titleCase(s) {
  return String(s ?? '').replace(/(^|\s)(\p{L})/gu, (_, sp, ch) => sp + ch.toUpperCase());
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function badge(result) {
  const map = { prihvaceno: ['badge-prihvaceno', 'Prihvaćeno'], odbijeno: ['badge-odbijeno', 'Odbijeno'], nepoznato: ['badge-nepoznato', 'Nepoznato'] };
  const [cls, label] = map[result] || map.nepoznato;
  return `<span class="badge ${cls}">${label}</span>`;
}

// Stacked tally bar for a table row. Segment order encodes the outcome: the
// leading colour is green when the vote passed, red when it was rejected.
function rowBar(t, result) {
  const total = t.za + t.protiv + t.suzdrzani + t.odsutni || 1;
  const pct = k => (t[k] / total * 100).toFixed(2);
  const seg = { za: 'seg-za', protiv: 'seg-protiv', suzdrzani: 'seg-suzdrzani', odsutni: 'seg-odsutni' };
  const order = result === 'odbijeno'
    ? ['protiv', 'za', 'suzdrzani', 'odsutni']   // rejected → red leads
    : ['za', 'protiv', 'suzdrzani', 'odsutni'];  // passed / unknown → green leads
  return `<div class="vote-row-bar">${order
    .map(k => `<span class="${seg[k]}" style="width:${pct(k)}%"></span>`).join('')}</div>`;
}

function voteRow(v, i) {
  const proposer = v.proposer_name
    ? `<div class="vote-row-proposer">${esc(capitalize(v.proposer_name))}</div>` : '';
  return `
    <div class="vote-row" data-idx="${i}">
      <div class="vote-row-main">
        <div class="vote-row-title">${esc(capitalize(v.title))}</div>
        ${proposer}
      </div>
      ${rowBar(v.tally, v.result)}
    </div>`;
}

// ── List view — votes grouped by session + sitting day, paged ────────────────────

// votes are already sorted newest-first; group consecutive ones by session+date.
function groupBySession() {
  const groups = [];
  let cur = null;
  votes.forEach((v, i) => {
    const key = `${v.session}|${v.date}`;
    if (!cur || cur.key !== key) {
      cur = { key, session: v.session, date: v.date, items: [] };
      groups.push(cur);
    }
    cur.items.push({ v, i });
  });
  return groups;
}

function renderList() {
  const groups = groupBySession();
  const shown = groups.slice(0, listVisible);

  const container = document.getElementById('vote-list');
  container.innerHTML = shown.map(g => `
    <section class="session-group">
      <div class="session-header">
        <div class="session-name">${esc(titleCase(g.session)) || 'Glasanje'}</div>
        <div class="session-date">${fmt(g.date)}</div>
      </div>
      <div class="vote-table">
        ${g.items.map(({ v, i }) => voteRow(v, i)).join('')}
      </div>
    </section>
  `).join('')
    + (groups.length > listVisible
        ? `<button class="load-more" id="load-more">Učitaj više sjednica</button>` : '');

  container.querySelectorAll('.vote-row').forEach(row => {
    row.addEventListener('click', () => showDetail(+row.dataset.idx));
  });
  document.getElementById('load-more')?.addEventListener('click', () => {
    listVisible += SESSIONS_STEP;
    renderList();
  });
}

// ── Detail view ───────────────────────────────────────────────────────────────

function showDetail(idx) {
  const v = votes[idx];
  activeVoteIdx = idx;
  activeClubs.clear();
  listScrollY = window.scrollY;   // remember where we were in the feed

  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('visible');
  dv.querySelector('#detail-content').innerHTML = buildDetail(v);
  bindDetailEvents(v);
  window.scrollTo(0, 0);          // detail always opens at the top
}

function buildDetail(v) {
  const dotColor = v.proposer_color || '#ccc';
  const proposerLabel = v.proposer_name ? capitalize(v.proposer_name) : capitalize(v.proposer_type);

  return `
    <div class="detail-header">
      <div class="detail-meta">${v.session} · ${fmt(v.date)}</div>
      <div class="detail-title">${capitalize(v.title)}</div>
      <div class="detail-proposer-row">
        <span class="proposer-chip">
          <span class="proposer-dot" style="background:${dotColor}"></span>
          ${proposerLabel}
        </span>
        <div class="detail-result-row">
          ${badge(v.result)}
        </div>
      </div>
    </div>

    <div class="eli5">
      <div class="eli5-label">AI generirani sažetak</div>
      <div class="eli5-text">${v.summary ? esc(v.summary) : 'Sažetak nije dostupan.'}</div>
    </div>

    <div class="section vote-section">
      <button class="mp-grid-reset" id="mp-reset" style="display:none">Poništi odabir</button>

      <div class="hemicycle-wrap" id="seating">${buildSeating(v, activeClubs)}</div>

      <div class="cell-bar-wrap" id="cellbar">${buildCellBar(v, activeClubs)}</div>

      <div class="total-bar-legend" style="justify-content:center;margin-top:8px">
        ${['za','protiv','suzdrzani','odsutni'].map(k => `
          <div class="legend-item">
            <span class="legend-dot" style="border-radius:50%;background:${VOTE_COLORS[k]}"></span>
            ${VOTE_LABELS[k]}: <strong>${v.tally[k]}</strong>
          </div>`).join('')}
      </div>

      <div class="club-pills" id="club-pills">${buildClubPills(v, activeClubs)}</div>
      <div id="selection-summary">${selectionSummary(v, activeClubs)}</div>
    </div>
  `;
}

// Combined tally for the currently selected clubs (drives the readout line).
function selectionSummary(v, selected) {
  if (!selected.size) return '';
  const t = { za: 0, protiv: 0, suzdrzani: 0, odsutni: 0 };
  const names = [];
  v.by_club.filter(c => selected.has(c.club_slug)).forEach(c => {
    t.za += c.za; t.protiv += c.protiv; t.suzdrzani += c.suzdrzani; t.odsutni += c.odsutni;
    names.push(c.club);
  });
  if (selected.has('__none__')) {   // club-less members have no by_club row — tally from by_mp
    const k = { for: 'za', against: 'protiv', abstain: 'suzdrzani', absent: 'odsutni', 'did not vote': 'odsutni' };
    v.by_mp.filter(m => !m.club_slug).forEach(m => { t[k[m.vote] ?? 'odsutni']++; });
    names.push('Nezavisni');
  }
  return `<div class="selection-summary"><strong>${esc(names.join(', '))}</strong> — `
    + `${t.za} za · ${t.protiv} protiv · ${t.suzdrzani} suzdržani · ${t.odsutni} odsutni</div>`;
}

// One pill per club; toggles membership in the active selection.
function buildClubPills(v, selected) {
  const pills = v.by_club
    .filter(c => (c.za + c.protiv + c.suzdrzani + c.odsutni) > 0)
    .map(c => {
      const total = c.za + c.protiv + c.suzdrzani + c.odsutni;
      const active = selected.has(c.club_slug) ? ' active' : '';
      return `<button class="club-pill${active}" data-club="${esc(c.club_slug)}">
        <span class="pill-dot" style="background:${c.club_color || '#ccc'}"></span>
        ${esc(c.club)} <span class="pill-count">${total}</span>
      </button>`;
    });
  // Synthetic pill for club-less ("Nezavisni") members so they're filterable too.
  // They have no by_club row, so key the selection on the '__none__' sentinel that
  // buildSeating/buildCellBar use for MPs without a club_slug.
  const indep = v.by_mp.filter(m => !m.club_slug).length;
  if (indep) {
    const active = selected.has('__none__') ? ' active' : '';
    pills.push(`<button class="club-pill${active}" data-club="__none__">
        <span class="pill-dot" style="background:var(--gray-3)"></span>
        Nezavisni <span class="pill-count">${indep}</span>
      </button>`);
  }
  return pills.join('');
}

// Distribution bar: one cell per MP, grouped by vote (so it still reads as the
// overall split), ordered by club within each group. Cells of unselected clubs
// dim when a selection is active — revealing a club's spread across the options.
// Renders two layouts; CSS shows the combined bar on desktop, the per-option
// split bars on mobile.
function buildCellBar(v, selected) {
  const clubIdx = new Map(v.by_club.map((c, i) => [c.club_slug, i]));
  const optOrder = { for: 0, against: 1, abstain: 2, absent: 3, 'did not vote': 3 };
  const optKey = { for: 'za', against: 'protiv', abstain: 'suzdrzani', absent: 'odsutni', 'did not vote': 'odsutni' };
  const mps = v.by_mp.slice().sort((a, b) => {
    const oa = optOrder[a.vote] ?? 4, ob = optOrder[b.vote] ?? 4;
    if (oa !== ob) return oa - ob;
    return (clubIdx.get(a.club_slug) ?? 999) - (clubIdx.get(b.club_slug) ?? 999);
  });
  if (!mps.length) return '';

  const cell = mp => {
    const color = SEAT_COLOR[mp.vote] || 'var(--vote-odsutni)';
    const dim = selected.size && !selected.has(mp.club_slug || '__none__');
    const label = SEAT_VOTE_LABEL[mp.vote] || '—';
    return `<span class="cell" style="background:${color};opacity:${dim ? 0.12 : 1}" `
      + `title="${esc(mp.mp_name)} — ${esc(mp.club || 'Nezavisni')} · ${label}"></span>`;
  };

  // Desktop: one combined full-width bar.
  const combined = `<div class="cell-bar cell-bar--combined">${mps.map(cell).join('')}</div>`;

  // Mobile: one labelled bar per vote option, stacked. Bars are scaled to the
  // largest option (it fills the full width, the rest scale relative to it), so
  // the lengths show how many voted each way. Member cells stay a uniform width.
  const groups = ['za', 'protiv', 'suzdrzani', 'odsutni']
    .map(k => ({ k, members: mps.filter(mp => optKey[mp.vote] === k) }));
  const maxCount = Math.max(1, ...groups.map(g => g.members.length));
  const rows = groups.map(({ k, members }) => {
    if (!members.length) return '';
    const pct = (members.length / maxCount * 100).toFixed(2);
    return `<div class="split-row">
      <div class="split-label">
        <span class="legend-dot" style="border-radius:50%;background:${VOTE_COLORS[k]}"></span>
        ${VOTE_LABELS[k]}: <strong>${members.length}</strong>
      </div>
      <div class="cell-bar cell-bar--split" style="width:${pct}%">${members.map(cell).join('')}</div>
    </div>`;
  }).join('');
  const split = `<div class="cell-bars--split">${rows}</div>`;

  return combined + split;
}

// Generate a parliament-style hemicycle layout for `n` seats: concentric rows,
// each holding seats proportional to its capacity so density is uniform.
// Returns { seats:[{r,theta}], outerR, b } in abstract row-pitch units.
function seatGeometry(n) {
  const b = 0.42;      // seat radius
  const r1 = 2.2;      // innermost row radius
  const pitch = 1.0;   // gap between rows
  const rowRadius = i => r1 + i * pitch;
  const rowCap = r => Math.max(1, Math.floor(Math.PI / (2 * Math.asin(Math.min(0.9999, b / r)))));

  let rows = 1;
  for (;;) {
    let cap = 0;
    for (let i = 0; i < rows; i++) cap += rowCap(rowRadius(i));
    if (cap >= n || rows > 40) break;
    rows++;
  }

  const caps = [];
  let totalCap = 0;
  for (let i = 0; i < rows; i++) { const c = rowCap(rowRadius(i)); caps.push(c); totalCap += c; }
  const counts = caps.map(c => Math.round(n * c / totalCap));

  // Reconcile rounding so the seats sum to exactly n (adjust outer rows first).
  let diff = n - counts.reduce((a, c) => a + c, 0);
  for (let i = rows - 1; diff !== 0 && i >= 0; i--) {
    if (diff > 0) { counts[i]++; diff--; }
    else if (counts[i] > 0) { counts[i]--; diff++; }
  }

  const seats = [];
  for (let i = 0; i < rows; i++) {
    const m = counts[i];
    const r = rowRadius(i);
    for (let j = 0; j < m; j++) {
      const theta = m === 1 ? Math.PI / 2 : Math.PI * (j + 0.5) / m;
      seats.push({ r, theta });
    }
  }
  return { seats, outerR: rowRadius(rows - 1) + b, b };
}

// Top-down view of the chamber: one dot per MP, coloured by their vote,
// clubs sitting together as contiguous wedges (coalition-first, sweeping left→right).
// `selected` is a Set of club_slugs to highlight (others dim); empty = show all.
function buildSeating(v, selected) {
  // Order MPs by club so each club forms a contiguous wedge.
  const order = v.by_club.map(c => c.club_slug);
  const byClub = new Map();
  v.by_mp.forEach(mp => {
    const slug = mp.club_slug || '__none__';
    if (!byClub.has(slug)) byClub.set(slug, []);
    byClub.get(slug).push(mp);
  });
  const ordered = [];
  order.forEach(slug => { if (byClub.has(slug)) { ordered.push(...byClub.get(slug)); byClub.delete(slug); } });
  byClub.forEach(arr => ordered.push(...arr)); // any clubs not in by_club

  const n = ordered.length;
  if (n === 0) return '<div class="seating-empty">Nema podataka o pojedinačnim glasovima.</div>';

  const { seats, outerR, b } = seatGeometry(n);
  seats.sort((a, c) => c.theta - a.theta); // left (π) → right (0)

  const pad = 6;
  const S = 150 / outerR;                 // scale row-units → px
  const W = 2 * outerR * S + pad * 2;
  const H = outerR * S + pad * 2;
  const cx = W / 2;
  const cy = H - pad;
  const seatPx = b * S;

  const circles = ordered.map((mp, i) => {
    const s = seats[i];
    const x = cx + s.r * S * Math.cos(s.theta);
    const y = cy - s.r * S * Math.sin(s.theta);
    const color = SEAT_COLOR[mp.vote] || 'var(--vote-odsutni)';
    const dim = selected.size && !selected.has(mp.club_slug || '__none__');
    const club = mp.club || 'Nezavisni';
    const label = SEAT_VOTE_LABEL[mp.vote] || '—';
    // Seats with a known MP become tappable → that MP's profile. Phantom/null-id
    // entries stay non-interactive (no slug to navigate to).
    const slug = mp.mp_slug;
    const interactive = slug
      ? ` class="seat" data-mp="${esc(slug)}" tabindex="0" role="button" `
        + `aria-label="${esc(mp.mp_name)} — ${esc(club)}"`
      : '';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${seatPx.toFixed(1)}"${interactive} `
      + `style="fill:${color}" stroke-width="0.6" opacity="${dim ? 0.12 : 1}">`
      + `<title>${esc(mp.mp_name)} — ${esc(club)} · ${label}</title></circle>`;
  }).join('');

  return `<svg class="hemicycle" viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" `
    + `xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Raspored zastupnika u Saboru">`
    + `${circles}</svg>`;
}

// Re-render the parts that respond to the club selection.
function rerenderSelection(v) {
  document.getElementById('seating').innerHTML = buildSeating(v, activeClubs);
  document.getElementById('cellbar').innerHTML = buildCellBar(v, activeClubs);
  document.getElementById('selection-summary').innerHTML = selectionSummary(v, activeClubs);
  document.querySelectorAll('.club-pill').forEach(p =>
    p.classList.toggle('active', activeClubs.has(p.dataset.club)));
  document.getElementById('mp-reset').style.display = activeClubs.size ? 'inline' : 'none';
}

function bindDetailEvents(v) {
  // Club pills → toggle highlight on seating + bar (multi-select)
  document.querySelectorAll('.club-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const slug = pill.dataset.club;
      if (activeClubs.has(slug)) activeClubs.delete(slug);
      else activeClubs.add(slug);
      rerenderSelection(v);
    });
  });

  document.getElementById('mp-reset')?.addEventListener('click', () => {
    activeClubs.clear();
    rerenderSelection(v);
  });

  // Tap a seat → open that MP's profile, remembering this vote so we can slide
  // up a "back to glasanje" pill. Delegated so it survives seating re-renders.
  const seating = document.getElementById('seating');
  const openSeat = el => {
    const slug = el?.dataset.mp;
    if (!slug) return;
    openMpFromVote(slug);
  };
  seating?.addEventListener('click', e => openSeat(e.target.closest('.seat')));
  seating?.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const seat = e.target.closest('.seat');
      if (seat) { e.preventDefault(); openSeat(seat); }
    }
  });
}

// Top-level sections. Glasanja = the feed (list + detail); Zastupnici = the
// participation scorecard; Klubovi is disabled. Switching resets any open detail.
function showSection(name) {
  hideMpReturn();

document.getElementById('main-nav').addEventListener('click', e => {

  if (!b || b.disabled) return;
  showSection(b.dataset.section);
});

// ── Zastupnici scorecard — per-MP participation, aggregated client-side ─────────

// Participation = (za + protiv + suzdržan) / votes-while-seated. The denominator is
// the number of votes the MP appears in (was seated for), NOT all votes — so MPs
// with a partial term aren't penalised for ballots before/after their tenure.
// Honest labelling: this is voting participation, never physical attendance; the
// non-voting bucket is "nije glasovao", not "odsutan".
let scorecardRows = null;
function computeScorecard() {
  if (scorecardRows) return scorecardRows;
  if (!votes.length) return [];
  const m = new Map();
  let maxDate = '';
  for (const v of votes) {
    if (!v.by_mp || !v.by_mp.length) continue;
    if (v.date > maxDate) maxDate = v.date;   // latest sitting day with a roster
    for (const mp of v.by_mp) {
      if (!mp.mp_slug) continue;   // skip null-id phantom entries (a dup of the real slug)
      let r = m.get(mp.mp_slug);
      if (!r) { r = { name: mp.mp_name, slug: mp.mp_slug, club: null, club_color: null, firstDate: v.date, lastDate: '',
                      seated: 0, cast: 0, za: 0, protiv: 0, suzdrzan: 0, nije: 0 }; m.set(mp.mp_slug, r); }
      if (v.date < r.firstDate) r.firstDate = v.date;
      r.seated++;
      if (mp.vote === 'for') { r.cast++; r.za++; }
      else if (mp.vote === 'against') { r.cast++; r.protiv++; }
      else if (mp.vote === 'abstain') { r.cast++; r.suzdrzan++; }
      else r.nije++;
      if (v.date >= r.lastDate) { r.lastDate = v.date; r.club = mp.club; r.club_color = mp.club_color; }
    }
  }
  // active = still in the latest roster; otherwise the member's term has ended.
  // participation stays cast/seated, so a former member keeps their term attendance.
  scorecardRows = [...m.values()].map(r => ({ ...r, part: r.seated ? r.cast / r.seated : 0, active: r.lastDate === maxDate }));
  return scorecardRows;
}

let scSort = { key: 'part', dir: -1 };   // default: participation, high → low

// "Krešimir Ačkar" → "Krešimir A." ; "Ana Puž Kukuljan" → "Ana P. K." (mobile only).
function abbreviateName(full) {
  const parts = String(full || '').trim().split(/\s+/);
  if (parts.length < 2) return full;
  return parts[0] + ' ' + parts.slice(1).map(p => p[0].toUpperCase() + '.').join(' ');
}

function scRow(r) {
  const pct = Math.round(r.part * 100);
  const club = r.club || 'Nezavisni';
  const color = r.club_color || 'var(--gray-3)';
  const term = r.active ? '' : `<span class="mp-term" title="Zadnje glasovanje">do ${fmt(r.lastDate)}</span>`;
  return `<tr class="mp-row${r.active ? '' : ' mp-row--inactive'}" data-slug="${esc(r.slug)}">
    <td class="sc-name"><span class="name-full">${esc(r.name)}</span><span class="name-abbr">${esc(abbreviateName(r.name))}</span>${term}</td>
    <td class="sc-club"><span class="club-dot" style="background:${esc(color)}"></span>${esc(club)}</td>
    <td class="sc-part">
      <div class="part-cell" title="${r.cast} / ${r.seated} glasovanja">
        <span class="part-bar"><span style="width:${pct}%"></span></span>
        <span class="part-pct">${pct}%</span>
      </div>
    </td>
    <td class="sc-num rz-za">${r.za}</td>
    <td class="sc-num rz-protiv">${r.protiv}</td>
    <td class="sc-num rz-suzdrzani">${r.suzdrzan}</td>
    <td class="sc-num rz-nije">${r.nije}</td>
  </tr>`;
}

function renderScorecard() {
  const el = document.getElementById('scorecard');
  if (!el) return;
  const rows = computeScorecard().slice();
  if (!rows.length) { el.innerHTML = '<div class="section-placeholder"><div class="placeholder-text">Učitavanje…</div></div>'; return; }

  const { key, dir } = scSort;
  rows.sort((a, b) => {
    if (key === 'name' || key === 'club') {
      const av = (a[key] || '').toLowerCase(), bv = (b[key] || '').toLowerCase();
      return av < bv ? -dir : av > bv ? dir : 0;
    }
    return (a[key] - b[key]) * dir;
  });
  const avg = Math.round(rows.reduce((s, r) => s + r.part, 0) / rows.length * 100);
  const arrow = k => key === k ? (dir === 1 ? ' ▲' : ' ▼') : '';

  el.innerHTML = `
    <div class="scorecard-summary">${rows.length} zastupnika · prosječno sudjelovanje ${avg}%</div>
    <table class="mp-table">
      <thead><tr>
        <th class="sc-th sc-name" data-key="name">Zastupnik${arrow('name')}</th>
        <th class="sc-th sc-club" data-key="club">Klub${arrow('club')}</th>
        <th class="sc-th sc-part" data-key="part">Sudjelovanje${arrow('part')}</th>
        <th class="sc-th sc-num" data-key="za" title="Za">Z${arrow('za')}</th>
        <th class="sc-th sc-num" data-key="protiv" title="Protiv">P${arrow('protiv')}</th>
        <th class="sc-th sc-num" data-key="suzdrzan" title="Suzdržani">S${arrow('suzdrzan')}</th>
        <th class="sc-th sc-num" data-key="nije" title="Nisu glasovali">N${arrow('nije')}</th>
      </tr></thead>
      <tbody>${rows.map(scRow).join('')}</tbody>
    </table>`;
}

// Sort when a column header is clicked.
document.getElementById('scorecard').addEventListener('click', e => {
  const th = e.target.closest('.sc-th[data-key]');
  if (th) {
    const key = th.dataset.key;
    if (scSort.key === key) scSort.dir *= -1;
    else scSort = { key, dir: (key === 'name' || key === 'club') ? 1 : -1 };
    renderScorecard();
    return;
  }
  const row = e.target.closest('.mp-row[data-slug]');
  if (row) showMpProfile(row.dataset.slug);
});

// ── MP profile (reached from a scorecard row) ──────────────────────────────────

// Extra per-MP stats the scorecard doesn't compute: government-proposal support
// and club cohesion. Single pass over the votes the MP appears in.
function mpExtras(slug) {
  let govCast = 0, govZa = 0, govTotal = 0, cohWith = 0, cohTotal = 0, broke = 0;
  for (const v of votes) {
    if (!v.by_mp) continue;
    const e = v.by_mp.find(m => m.mp_slug === slug);
    if (!e) continue;
    if (v.proposer_type === 'vlada') { govTotal++; if (e.vote !== 'absent') { govCast++; if (e.vote === 'for') govZa++; } }
    if (e.vote !== 'absent' && v.by_club) {
      const cl = v.by_club.find(c => c.club_slug === e.club_slug);
      if (cl) {
        const maj = [['for', cl.za], ['against', cl.protiv], ['abstain', cl.suzdrzani]].sort((a, b) => b[1] - a[1])[0];
        if (maj[1] > 0) { cohTotal++; if (e.vote === maj[0]) cohWith++; else broke++; }
      }
    }
  }
  return { govCast, govZa, govTotal, cohWith, cohTotal, broke };
}

// Hemicycle showing where this MP sits — chamber coloured by club, their seat
// highlighted. Uses the roster of the MP's most recent vote (works for former MPs).
function buildMpSeating(slug) {
  const recent = votes.find(v => v.by_mp && v.by_mp.some(m => m.mp_slug === slug));
  if (!recent) return '';
  const order = recent.by_club.map(c => c.club_slug);
  const byClub = new Map();
  recent.by_mp.forEach(mp => {
    const s = mp.club_slug || '__none__';
    if (!byClub.has(s)) byClub.set(s, []);
    byClub.get(s).push(mp);
  });
  const ordered = [];
  order.forEach(s => { if (byClub.has(s)) { ordered.push(...byClub.get(s)); byClub.delete(s); } });
  byClub.forEach(arr => ordered.push(...arr));
  const n = ordered.length;
  if (!n) return '';
  const { seats, outerR, b } = seatGeometry(n);
  seats.sort((a, c) => c.theta - a.theta);
  const pad = 6, S = 150 / outerR;
  const W = 2 * outerR * S + pad * 2, H = outerR * S + pad * 2, cx = W / 2, cy = H - pad, seatPx = b * S;
  const circles = ordered.map((mp, i) => {
    const s = seats[i];
    const x = cx + s.r * S * Math.cos(s.theta), y = cy - s.r * S * Math.sin(s.theta);
    const me = mp.mp_slug === slug;
    const color = mp.club_color || 'var(--gray-3)';
    const rad = me ? seatPx + 2 : seatPx;
    // Tap any other MP's seat → jump to their profile (the current MP's own seat
    // isn't interactive — you're already here).
    const interactive = mp.mp_slug && !me
      ? ` class="seat" data-mp="${esc(mp.mp_slug)}" tabindex="0" role="button" `
        + `aria-label="${esc(mp.mp_name)} — ${esc(mp.club || 'Nezavisni')}"`
      : '';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rad.toFixed(1)}"${interactive} style="fill:${color}" `
      + `opacity="${me ? 1 : 0.4}" ${me ? 'stroke="var(--fg)" stroke-width="1.3"' : ''}>`
      + `<title>${esc(mp.mp_name)} — ${esc(mp.club || 'Nezavisni')}${me ? ' (ovaj zastupnik)' : ''}</title></circle>`;
  }).join('');
  return `<svg class="hemicycle" viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Položaj zastupnika u Saboru">${circles}</svg>`;
}

function buildMpProfile(slug) {
  const r = computeScorecard().find(x => x.slug === slug);
  if (!r) return '<div class="section-placeholder"><div class="placeholder-text">Nepoznat zastupnik.</div></div>';
  const x = mpExtras(slug);
  const ranked = computeScorecard().slice().sort((a, b) => b.part - a.part);
  const rank = ranked.findIndex(a => a.slug === slug) + 1;
  const pct = Math.round(r.part * 100);
  const club = r.club || 'Nezavisni';
  const color = r.club_color || 'var(--gray-3)';
  const govPct = x.govCast ? Math.round(100 * x.govZa / x.govCast) : null;
  const cohPct = x.cohTotal ? Math.round(100 * x.cohWith / x.cohTotal) : null;
  const t = r.za + r.protiv + r.suzdrzan + r.nije || 1;
  const seg = (k, val) => `<span class="seg-${k}" style="width:${val / t * 100}%"></span>`;
  const eur = n => n.toLocaleString('hr-HR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

  const exp = expenses && expenses.by_mp[slug];
  const info = mpInfo && mpInfo.by_mp[slug];
  // Gender-correct label picker (m / f / neutral fallback), from the scraped Rođen/Rođena.
  const gw = (m, f, neutral) => info && info.gender === 'm' ? m : info && info.gender === 'f' ? f : neutral;

  // Salary estimate: osnovica €1015 × koeficijent by role. Committee chairs (6.42) come
  // from the scraped duties; the Speaker (9.76) and the 5 current deputy speakers (7.14)
  // aren't in that block, so they're matched by slug. Everyone else is a regular MP (5.27).
  const placaCoef = /jandrokovic/i.test(slug) ? 9.76
    : /(reiner|penava|radin|glasovac|jaksic)/i.test(slug) ? 7.14
    : (info && info.duznosti && /\bPredsjednik (?!Hrvatskoga)/i.test(info.duznosti)) ? 6.42 : 5.27;
  const placa = Math.round(1015 * placaCoef);

  // Dashboard: the headline stats as a hairline-bordered grid of cards.
  const cards = [
    ['Sudjelovanje', pct + '%'],
    ['Glasovanja', r.cast + ' / ' + r.seated],
    ['Troškovi 2025.', exp ? eur(exp.ukupno) : '—'],
    ['Podrška vladi', govPct === null ? '—' : govPct + '%'],
    ['Klubska disciplina', cohPct === null ? '—' : cohPct + '%'],
    ['Plaća (procj.)', eur(placa)],
  ];
  const dashboard = `<div class="mp-dashboard">${cards.map(([l, v]) =>
    `<div class="mp-card"><div class="mp-card-label">${l}</div><div class="mp-card-value">${v}</div></div>`).join('')}</div>`;

  // Expenses breakdown (chips) — shown lower, beside the about text.
  let expBreakdown = '';
  if (exp) {
    const allTotals = Object.values(expenses.by_mp).map(e => e.ukupno);
    const erank = allTotals.filter(tt => tt > exp.ukupno).length + 1;
    const EXP_LABELS = { dnevnica: 'Dnevnice', auto: 'Automobil', cestarina: 'Cestarine', avion: 'Avion', javni: 'Javni prijevoz', hotel: 'Hotel', stanarina: 'Stanarina', rezije: 'Režije', odvzivot: 'Odvojeni život', sluzstan: 'Službeni stan', ostalo: 'Ostalo' };
    const items = Object.entries(exp.breakdown).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1])
      .map(([k, v]) => `<span class="exp-item">${EXP_LABELS[k] || k} <strong>${eur(v)}</strong></span>`).join('');
    expBreakdown = `
    <div class="section">
      <div class="section-label">Troškovi rada 2025. — razrada</div>
      <div class="mp-subnote">${eur(exp.ukupno)} ukupno · ${erank}. od ${allTotals.length} po iznosu · izvor: Hrvatski sabor</div>
      <div class="exp-breakdown">${items || '<span class="mp-subnote">Nema evidentiranih troškova.</span>'}</div>
    </div>`;
  }

  // About — scraped bio (photo is in the header; party / izborna / committees here).
  let aboutSection = '';
  if (info) {
    const rows = [['Stranka', info.stranka], ['Izborna jedinica', info.izborna], ['Mandat od', info.mandat]]
      .filter(([, v]) => v).map(([k, v]) => `<div class="about-row"><span class="about-k">${k}</span><span>${esc(v)}</span></div>`).join('');
    const odbori = (info.odbori || []).length
      ? `<div class="about-k" style="margin-top:16px;display:block">Dužnosti u saboru</div><ul class="about-odbori">${info.odbori.map(o => `<li>${esc(o)}</li>`).join('')}</ul>` : '';
    aboutSection = `
    <div class="section">
      <div class="section-label">O zastupniku</div>
      ${info.zivotopis ? `<p class="mp-zivotopis">${esc(info.zivotopis)}</p>` : ''}
      <div class="mp-about">${rows}</div>
      ${odbori}
      ${info.source ? `<div class="mp-subnote" style="margin-top:12px"><a href="${esc(info.source)}" target="_blank" rel="noopener">Profil na sabor.hr ↗</a></div>` : ''}
    </div>`;
  }

  return `
    <div class="detail-header mp-header">
      ${info && info.photo ? `<img class="mp-photo" src="${esc(info.photo)}" alt="${esc(r.name)}" loading="lazy">` : ''}
      <div>
        <div class="detail-meta">${fmt(r.firstDate)} – ${fmt(r.lastDate)} · ${r.seated} glasovanja</div>
        <div class="detail-title">${esc(r.name)}</div>
        <div class="detail-proposer-row">
          <span class="proposer-chip"><span class="proposer-dot" style="background:${esc(color)}"></span>${esc(club)}</span>
          ${r.active ? '' : `<span class="badge badge-nepoznato">${gw('Bivši zastupnik', 'Bivša zastupnica', 'Bivši/a zastupnik/ca')} · do ${fmt(r.lastDate)}</span>`}
        </div>
      </div>
    </div>

    ${dashboard}
    <div class="mp-subnote" style="margin:-18px 0 28px">${rank}. od ${ranked.length} po sudjelovanju · plaća je bruto procjena (osnovica €1.015 × koeficijent, bez staža)</div>

    <div class="section">
      <div class="section-label">Položaj u Saboru</div>
      <div class="hemicycle-wrap">${buildMpSeating(slug)}</div>
    </div>

    <div class="section">
      <div class="section-label">Kako glasa</div>
      <div class="vote-row-bar" style="height:10px;border-radius:3px;overflow:hidden">
        ${seg('za', r.za)}${seg('protiv', r.protiv)}${seg('suzdrzani', r.suzdrzan)}${seg('odsutni', r.nije)}
      </div>
      <div class="total-bar-legend" style="margin-top:10px">
        <div class="legend-item"><span class="legend-dot" style="background:var(--vote-za)"></span>Za: <strong>${r.za}</strong></div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--vote-protiv)"></span>Protiv: <strong>${r.protiv}</strong></div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--vote-suzdrzani)"></span>${gw('Suzdržan', 'Suzdržana', 'Suzdržan/a')}: <strong>${r.suzdrzan}</strong></div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--vote-odsutni)"></span>${gw('Nije glasovao', 'Nije glasala', 'Nije glasovao/la')}: <strong>${r.nije}</strong></div>
      </div>
      ${(govPct !== null || cohPct !== null) ? `<div class="mp-subnote" style="margin-top:14px">${govPct !== null ? `Podržava <strong>${govPct}%</strong> vladinih prijedloga (ZA na ${x.govZa} od ${x.govCast})` : ''}${(govPct !== null && cohPct !== null) ? ' · ' : ''}${cohPct !== null ? `s klubom <strong>${cohPct}%</strong>, protiv ${x.broke}×` : ''}</div>` : ''}
    </div>

    ${aboutSection}
    ${expBreakdown}
  `;
}

function showMpProfile(slug) {
  // Hide every other top-level view — this is reachable from the scorecard AND
  // from a vote's seating chart, so both the list and an open detail must close.
  document.getElementById('zastupnici-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.remove('visible');
  document.getElementById('mp-view').style.display = '';
  document.getElementById('mp-content').innerHTML = buildMpProfile(slug);
  window.scrollTo(0, 0);
}

// Open an MP profile from inside a vote, arming the sticky "back to glasanje" pill.
function openMpFromVote(slug) {
  mpReturn = { idx: activeVoteIdx, scrollY: window.scrollY };
  showMpProfile(slug);
  document.getElementById('mp-return-bar').classList.add('show');
}

// Re-open the vote the MP profile was reached from, restoring scroll + club selection.
function returnToVote() {
  if (!mpReturn || mpReturn.idx < 0) return;
  const { idx, scrollY } = mpReturn;
  hideMpReturn();
  document.getElementById('mp-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('visible');
  const v = votes[idx];
  dv.querySelector('#detail-content').innerHTML = buildDetail(v);
  bindDetailEvents(v);
  window.scrollTo(0, scrollY || 0);
}

function hideMpReturn() {
  mpReturn = null;
  document.getElementById('mp-return-bar').classList.remove('show');
}

document.getElementById('mp-return-go').addEventListener('click', returnToVote);
document.getElementById('mp-return-x').addEventListener('click', hideMpReturn);

// Tap another MP's seat in the profile hemicycle → switch to their profile.
// mpReturn is left untouched, so a "back to glasanje" pill still points at the
// original vote even after hopping between MPs.
const mpView = document.getElementById('mp-view');
const openMpSeat = el => { const s = el?.dataset.mp; if (s) showMpProfile(s); };
mpView.addEventListener('click', e => openMpSeat(e.target.closest('.seat')));
mpView.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const seat = e.target.closest('.seat');
    if (seat) { e.preventDefault(); openMpSeat(seat); }
  }
});

// Top back always returns to the Zastupnici list (the MP's "home" section). The
// contextual path back to a vote is the sticky pill, not this button.
document.getElementById('mp-back-btn').addEventListener('click', () => showSection('zastupnici'));

// ── Settings (density + text size, persisted to localStorage) ────────────────────

const SETTINGS = {
  theme:    { key: 'sabor.theme',    values: ['light', 'auto', 'dark'],           def: 'auto',     attr: 'data-theme' },
  density:  { key: 'sabor.density',  values: ['compact', 'standard', 'spacious'], def: 'standard', attr: 'data-density' },
  fontsize: { key: 'sabor.fontsize', values: ['small', 'standard', 'large'],     def: 'standard', attr: 'data-fontsize' },
};

function readSetting(s) {
  let v = null;
  try { v = localStorage.getItem(s.key); } catch (_) {}
  return s.values.includes(v) ? v : s.def;
}

// Apply a setting to <html> and reflect it on its segmented control.
function applySetting(name) {
  const s = SETTINGS[name];
  const v = readSetting(s);
  document.documentElement.setAttribute(s.attr, v);
  document.querySelectorAll(`#seg-${name} button`).forEach(b =>
    b.classList.toggle('active', b.dataset[name] === v));
}

function setSetting(name, value) {
  const s = SETTINGS[name];
  if (!s.values.includes(value)) return;
  try { localStorage.setItem(s.key, value); } catch (_) {}
  applySetting(name);
}

function initSettings() {
  document.getElementById('settings-btn').innerHTML = ICONS.gear;
  document.getElementById('settings-close').innerHTML = ICONS.close;

  applySetting('theme');
  applySetting('density');
  applySetting('fontsize');

  const overlay = document.getElementById('settings-overlay');
  const close = () => overlay.classList.remove('open');

  document.getElementById('settings-btn').addEventListener('click', () => overlay.classList.add('open'));
  document.getElementById('settings-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

  document.getElementById('seg-density').addEventListener('click', e => {
    const b = e.target.closest('button'); if (b) setSetting('density', b.dataset.density);
  });
  document.getElementById('seg-fontsize').addEventListener('click', e => {
    const b = e.target.closest('button'); if (b) setSetting('fontsize', b.dataset.fontsize);
  });
  document.getElementById('seg-theme').addEventListener('click', e => {
    const b = e.target.closest('button'); if (b) setSetting('theme', b.dataset.theme);
  });
}

initSettings();

// ── Bootstrap ─────────────────────────────────────────────────────────────────

// Load the manifest, then pull every year file it lists and merge newest-first.
async function loadData() {
  const manifest = await fetch('data/index.json').then(r => r.json());
  const years = manifest.years.map(y => y.year);
  const lists = await Promise.all(
    years.map(y => fetch(`data/${y}.json`).then(r => r.json()))
  );
  votes = lists.flat().sort((a, b) =>
    b.date.localeCompare(a.date) || Number(b.vote_id) - Number(a.vote_id)
  );
  // Drop null-id phantom entries (Parladata dups of a real slug) from every roster,
  // so they don't inflate the seating chart / cell-bar / Nezavisni count.
  for (const v of votes) if (v.by_mp) v.by_mp = v.by_mp.filter(m => m.mp_slug);
  expenses = await fetch('data/expenses_2025.json').then(r => r.json()).catch(() => null);
  mpInfo = await fetch('data/mp_info.json').then(r => r.json()).catch(() => null);
  renderList();
  if (document.getElementById('zastupnici-view').style.display !== 'none') renderScorecard();
}

loadData().catch(e => {
  document.getElementById('vote-list').innerHTML =
    `<div style="color:#c0392b;padding:20px">Greška pri učitavanju podataka: ${e.message}</div>`;
});
</script>
